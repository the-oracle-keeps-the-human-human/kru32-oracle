name: Deploy Astro to GitHub Pages

on:
  # เริ่มด้วย manual เท่านั้น — ยังไม่ on:push จนกว่า cutover (S7) จะพร้อม
  # ระหว่างนี้ Pages ยังเสิร์ฟ main:/docs (เว็บ live ไม่กระทบ)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# กัน deploy ซ้อน — คิวเดียว ปล่อยตัวล่าสุด
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx astro build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
