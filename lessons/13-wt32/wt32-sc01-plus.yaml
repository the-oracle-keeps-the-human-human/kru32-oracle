# wt32-sc01-plus.yaml — บทที่ 13: ข้ามบอร์ด — WT32-SC01 Plus
#
# บอร์ด: WT32-SC01 Plus (ESP32-S3, ST7796 320x480, 8080 parallel as octal SPI)
# เป้าหมาย: เอา layout เดียวกับ intermediate.yaml ไปรันบอร์ดอื่น
#            เรียนรู้ว่า "เปลี่ยนบอร์ด = เปลี่ยนแค่ hardware layer"
#            สิ่งที่ต่าง: bus type, touch chip, PSRAM size, pin map
#
#   uvx esphome compile wt32-sc01-plus.yaml

esphome:
  name: kru32-wt32
  friendly_name: Kru32 WT32

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 4MB
  framework:
    type: esp-idf

psram:
  mode: quad
  speed: 80MHz

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: kru32-dev
  password: kru32pass123

i2c:
  - id: touch_i2c
    sda: 6
    scl: 5
    frequency: 400kHz

spi:
  - id: lcd_spi
    type: octal
    clk_pin: 47
    data_pins: [9, 46, 3, 8, 18, 17, 16, 15]

output:
  - platform: ledc
    pin: 45
    id: backlight_pwm
    frequency: 25000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON

touchscreen:
  - platform: ft63x6
    id: my_touch
    interrupt_pin: 7

globals:
  - id: counter
    type: int
    restore_value: no
    initial_value: "0"

font:
  - file: "gfonts://Roboto"
    id: font_title
    size: 28
  - file: "gfonts://Roboto"
    id: font_value
    size: 48
  - file: "gfonts://Roboto"
    id: font_btn
    size: 22

display:
  - platform: mipi_spi
    model: WT32-SC01-PLUS
    id: lcd
    spi_id: lcd_spi
    dimensions:
      width: 320
      height: 480
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: false

lvgl:
  displays:
    - lcd
  pages:
    - id: main_page
      bg_color: 0x0A0A1A
      bg_opa: COVER
      pad_all: 0
      radius: 0
      border_width: 0
      widgets:
        - label:
            align: TOP_MID
            y: 20
            text: "WT32-SC01 Plus"
            text_color: 0x00FF7F
            text_font: font_title

        - label:
            align: TOP_MID
            y: 55
            text: "8080 / Octal SPI"
            text_color: 0x888888
            text_font: font_btn

        - label:
            id: lbl_counter
            align: CENTER
            y: -40
            text: "0"
            text_color: 0x00FF7F
            text_font: font_value

        - bar:
            id: progress_bar
            align: CENTER
            y: 20
            width: 240
            height: 16
            min_value: 0
            max_value: 100
            value: 0
            bg_color: 0x1F1F3F
            bg_opa: COVER
            radius: 8
            indicator:
              bg_color: 0x00FF7F
              radius: 8

        - obj:
            align: CENTER
            y: 80
            width: 200
            height: 60
            bg_color: 0x1F3540
            bg_opa: COVER
            radius: 12
            border_width: 1
            border_color: 0x00FF7F
            widgets:
              - label:
                  align: CENTER
                  text: "+10"
                  text_color: 0x00FF7F
                  text_font: font_btn
            on_click:
              - lambda: |-
                  id(counter) += 10;
                  if (id(counter) > 100) id(counter) = 0;
              - lvgl.label.update:
                  id: lbl_counter
                  text: !lambda "return std::to_string(id(counter));"
              - lvgl.bar.update:
                  id: progress_bar
                  value: !lambda "return id(counter);"
