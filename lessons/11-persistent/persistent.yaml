# persistent.yaml — บทที่ 11: Persistent State — ค่ารอด reboot
#
# บอร์ด: Guition JC3248W535 (ESP32-S3, AXS15231B 320x480 QSPI)
# เป้าหมาย: globals + restore_value: yes → ค่ารอดผ่าน reboot
#            เรียนรู้ NVS flash storage + boot counter pattern
#
#   uvx esphome compile persistent.yaml

esphome:
  name: kru32-persistent
  friendly_name: Kru32 Persistent
  on_boot:
    priority: 200
    then:
      - lambda: |-
          id(boot_count) += 1;
          id(session_taps) = 0;

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: kru32-dev
  password: kru32pass123

# Improv Serial — ให้หน้า Config WiFi (แยกจาก flash) คุยกับบอร์ดได้
improv_serial:

i2c:
  - id: touch_i2c
    sda: GPIO4
    scl: GPIO8
    frequency: 400kHz

spi:
  - id: lcd_spi
    type: quad
    clk_pin: GPIO47
    data_pins: [GPIO21, GPIO48, GPIO40, GPIO39]

output:
  - platform: ledc
    pin: GPIO1
    id: backlight_pwm
    frequency: 25000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON

touchscreen:
  - platform: axs15231
    id: my_touch
    interrupt_pin: GPIO3

globals:
  - id: boot_count
    type: int
    restore_value: yes
    initial_value: "0"
  - id: total_taps
    type: int
    restore_value: yes
    initial_value: "0"
  - id: high_score
    type: int
    restore_value: yes
    initial_value: "0"
  - id: session_taps
    type: int
    restore_value: no
    initial_value: "0"

font:
  - file: "gfonts://Roboto"
    id: font_title
    size: 24
  - file: "gfonts://Roboto"
    id: font_big
    size: 48
  - file: "gfonts://Roboto"
    id: font_label
    size: 16

interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lbl_boots
          text: !lambda |-
            char buf[16];
            snprintf(buf, sizeof(buf), "Boots: %d", id(boot_count));
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_total
          text: !lambda |-
            char buf[20];
            snprintf(buf, sizeof(buf), "Total: %d", id(total_taps));
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_session
          text: !lambda |-
            char buf[20];
            snprintf(buf, sizeof(buf), "Session: %d", id(session_taps));
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_high
          text: !lambda |-
            char buf[20];
            snprintf(buf, sizeof(buf), "High: %d", id(high_score));
            return std::string(buf);

display:
  - platform: mipi_spi
    model: AXS15231
    id: lcd
    spi_id: lcd_spi
    cs_pin: GPIO45
    dimensions:
      width: 320
      height: 480
    color_order: rgb
    invert_colors: false
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: false

lvgl:
  displays:
    - lcd
  pages:
    - id: persist_page
      bg_color: 0x080810
      bg_opa: COVER
      pad_all: 0
      radius: 0
      border_width: 0
      widgets:
        - label:
            align: TOP_MID
            y: 20
            text: "Persistent State"
            text_color: 0xFFD27F
            text_font: font_title

        - label:
            id: lbl_boots
            align: CENTER
            y: -100
            text: "Boots: 0"
            text_color: 0xFF6B6B
            text_font: font_label

        - label:
            id: lbl_session
            align: CENTER
            y: -60
            text: "Session: 0"
            text_color: 0x4FB3FF
            text_font: font_big

        - label:
            id: lbl_total
            align: CENTER
            y: 0
            text: "Total: 0"
            text_color: 0x00FF7F
            text_font: font_label

        - label:
            id: lbl_high
            align: CENTER
            y: 30
            text: "High: 0"
            text_color: 0xBB86FC
            text_font: font_label

        - obj:
            align: CENTER
            y: 100
            width: 220
            height: 70
            bg_color: 0x1F3540
            bg_opa: COVER
            radius: 14
            border_width: 2
            border_color: 0x4FB3FF
            widgets:
              - label:
                  align: CENTER
                  text: "TAP ME"
                  text_color: 0x4FB3FF
                  text_font: font_title
            on_click:
              - lambda: |-
                  id(session_taps) += 1;
                  id(total_taps) += 1;
                  if (id(session_taps) > id(high_score)) {
                    id(high_score) = id(session_taps);
                  }
