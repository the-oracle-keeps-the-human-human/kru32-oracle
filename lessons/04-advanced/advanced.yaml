# advanced.yaml — บทที่ 4: Multi-page + Navigation Bar
#
# บอร์ด: Guition JC3248W535 (ESP32-S3, AXS15231B 320x480 QSPI)
# เป้าหมาย: 3 หน้า + nav bar ด้านล่าง + page switching ด้วย touch
#            เรี��นรู้ top_layer (always visible) + lvgl.page.show
#
#   uvx esphome compile advanced.yaml

esphome:
  name: kru32-advanced
  friendly_name: Kru32 Advanced

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: kru32-dev
  password: kru32pass123

i2c:
  - id: touch_i2c
    sda: GPIO4
    scl: GPIO8
    frequency: 400kHz

spi:
  - id: lcd_spi
    type: quad
    clk_pin: GPIO47
    data_pins: [GPIO21, GPIO48, GPIO40, GPIO39]

output:
  - platform: ledc
    pin: GPIO1
    id: backlight_pwm
    frequency: 25000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON

touchscreen:
  - platform: axs15231
    id: my_touch
    interrupt_pin: GPIO3

font:
  - file: "gfonts://Roboto"
    id: font_title
    size: 32
  - file: "gfonts://Roboto"
    id: font_body
    size: 20
  - file: "gfonts://Roboto"
    id: font_nav
    size: 16

display:
  - platform: mipi_spi
    model: AXS15231
    id: lcd
    spi_id: lcd_spi
    cs_pin: GPIO45
    dimensions:
      width: 320
      height: 480
    color_order: rgb
    invert_colors: false
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: false

lvgl:
  displays:
    - lcd
  pages:
    - id: page_home
      bg_color: 0x0A0A1A
      bg_opa: COVER
      pad_all: 0
      radius: 0
      border_width: 0
      widgets:
        - label:
            align: TOP_MID
            y: 30
            text: "HOME"
            text_color: 0xFFD27F
            text_font: font_title
        - label:
            align: CENTER
            text: "Welcome to Kru32"
            text_color: 0xFFFFFF
            text_font: font_body
        - label:
            align: CENTER
            y: 40
            text: "Tap nav below"
            text_color: 0x888888
            text_font: font_body

    - id: page_stats
      bg_color: 0x0A1A0A
      bg_opa: COVER
      pad_all: 0
      radius: 0
      border_width: 0
      widgets:
        - label:
            align: TOP_MID
            y: 30
            text: "STATS"
            text_color: 0x4FB3FF
            text_font: font_title
        - bar:
            id: stat_bar1
            align: CENTER
            y: -30
            width: 240
            height: 16
            min_value: 0
            max_value: 100
            value: 65
            bg_color: 0x1F1F3F
            bg_opa: COVER
            radius: 8
            indicator:
              bg_color: 0x4FB3FF
              radius: 8
        - label:
            align: CENTER
            y: 0
            text: "CPU: 65%"
            text_color: 0xFFFFFF
            text_font: font_body
        - bar:
            id: stat_bar2
            align: CENTER
            y: 40
            width: 240
            height: 16
            min_value: 0
            max_value: 100
            value: 42
            bg_color: 0x1F1F3F
            bg_opa: COVER
            radius: 8
            indicator:
              bg_color: 0x00FF7F
              radius: 8
        - label:
            align: CENTER
            y: 70
            text: "RAM: 42%"
            text_color: 0xFFFFFF
            text_font: font_body

    - id: page_about
      bg_color: 0x1A0A0A
      bg_opa: COVER
      pad_all: 0
      radius: 0
      border_width: 0
      widgets:
        - label:
            align: TOP_MID
            y: 30
            text: "ABOUT"
            text_color: 0xFF6B6B
            text_font: font_title
        - label:
            align: CENTER
            y: -20
            text: "JC3248W535"
            text_color: 0xFFFFFF
            text_font: font_body
        - label:
            align: CENTER
            y: 10
            text: "AXS15231 QSPI"
            text_color: 0x888888
            text_font: font_body
        - label:
            align: CENTER
            y: 40
            text: "320 x 480"
            text_color: 0x888888
            text_font: font_body

  top_layer:
    widgets:
      - obj:
          align: BOTTOM_LEFT
          x: 8
          y: -8
          width: 96
          height: 44
          bg_color: 0x1F3540
          bg_opa: COVER
          border_width: 1
          border_color: 0xFFD27F
          radius: 10
          widgets:
            - label:
                align: CENTER
                text: "HOME"
                text_color: 0xFFD27F
                text_font: font_nav
          on_click:
            - lvgl.page.show: page_home

      - obj:
          align: BOTTOM_MID
          y: -8
          width: 96
          height: 44
          bg_color: 0x0A1428
          bg_opa: COVER
          border_width: 1
          border_color: 0x4FB3FF
          radius: 10
          widgets:
            - label:
                align: CENTER
                text: "STATS"
                text_color: 0x4FB3FF
                text_font: font_nav
          on_click:
            - lvgl.page.show: page_stats

      - obj:
          align: BOTTOM_RIGHT
          x: -8
          y: -8
          width: 96
          height: 44
          bg_color: 0x280A0A
          bg_opa: COVER
          border_width: 1
          border_color: 0xFF6B6B
          radius: 10
          widgets:
            - label:
                align: CENTER
                text: "ABOUT"
                text_color: 0xFF6B6B
                text_font: font_nav
          on_click:
            - lvgl.page.show: page_about
