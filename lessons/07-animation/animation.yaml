# animation.yaml — บทที่ 7: LVGL Animations
#
# บอร์ด: Guition JC3248W535 (ESP32-S3, AXS15231B 320x480 QSPI)
# เป้าหมาย: ใช้ LVGL arc + spinner + animated bar
#            เรียนรู้ว่า LVGL จัดการ animation loop ให้เอง
#
#   uvx esphome compile animation.yaml

esphome:
  name: kru32-animation
  friendly_name: Kru32 Animation

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: kru32-dev
  password: kru32pass123

i2c:
  - id: touch_i2c
    sda: GPIO4
    scl: GPIO8
    frequency: 400kHz

spi:
  - id: lcd_spi
    type: quad
    clk_pin: GPIO47
    data_pins: [GPIO21, GPIO48, GPIO40, GPIO39]

output:
  - platform: ledc
    pin: GPIO1
    id: backlight_pwm
    frequency: 25000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON

touchscreen:
  - platform: axs15231
    id: my_touch
    interrupt_pin: GPIO3

globals:
  - id: progress
    type: int
    initial_value: "0"

interval:
  - interval: 100ms
    then:
      - lambda: |-
          id(progress) += 2;
          if (id(progress) > 100) id(progress) = 0;
      - lvgl.arc.update:
          id: arc_progress
          value: !lambda "return id(progress);"
      - lvgl.bar.update:
          id: bar_progress
          value: !lambda "return id(progress);"
      - lvgl.label.update:
          id: lbl_percent
          text: !lambda |-
            char buf[8];
            snprintf(buf, sizeof(buf), "%d%%", id(progress));
            return std::string(buf);

font:
  - file: "gfonts://Roboto"
    id: font_title
    size: 24
  - file: "gfonts://Roboto"
    id: font_big
    size: 48
  - file: "gfonts://Roboto"
    id: font_small
    size: 16

display:
  - platform: mipi_spi
    model: AXS15231
    id: lcd
    spi_id: lcd_spi
    cs_pin: GPIO45
    dimensions:
      width: 320
      height: 480
    color_order: rgb
    invert_colors: false
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: false

lvgl:
  displays:
    - lcd
  pages:
    - id: anim_page
      bg_color: 0x0A0A14
      bg_opa: COVER
      pad_all: 0
      radius: 0
      border_width: 0
      widgets:
        - label:
            align: TOP_MID
            y: 20
            text: "Animations"
            text_color: 0xFFD27F
            text_font: font_title

        - arc:
            id: arc_progress
            align: CENTER
            y: -60
            width: 180
            height: 180
            min_value: 0
            max_value: 100
            value: 0
            start_angle: 135
            end_angle: 45
            bg_color: 0x1F1F3F
            indicator:
              arc_color: 0x4FB3FF
              arc_width: 12
            arc_width: 12

        - label:
            id: lbl_percent
            align: CENTER
            y: -60
            text: "0%"
            text_color: 0xFFFFFF
            text_font: font_big

        - bar:
            id: bar_progress
            align: CENTER
            y: 80
            width: 260
            height: 20
            min_value: 0
            max_value: 100
            value: 0
            bg_color: 0x1F1F3F
            bg_opa: COVER
            radius: 10
            indicator:
              bg_color: 0x00FF7F
              radius: 10

        - spinner:
            align: CENTER
            y: 160
            width: 50
            height: 50
            arc_length: 60
            spin_time: 1000ms
            indicator:
              arc_color: 0xFF6B6B
              arc_width: 6
            arc_width: 6
            arc_color: 0x2A2A2A

        - label:
            align: CENTER
            y: 200
            text: "Loading..."
            text_color: 0x888888
            text_font: font_small
