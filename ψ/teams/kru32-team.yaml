# kru32-team — Codex team for kru32-oracle
# Pattern: charter yaml + maw team up/down
# Makefile wraps: make team-up / make team-down
# Report to lead: maw hey 81-kru32:kru32-oracle

name: kru32-team
project: the-oracle-keeps-the-human-human/kru32-oracle
session: 81-kru32

engines:
  omx-1: 'OMX_AUTO_UPDATE=0 CODEX_HOME=~/.codex-team/1 omx --direct --madmax'
  omx-3: 'OMX_AUTO_UPDATE=0 CODEX_HOME=~/.codex-team/3 omx --direct --madmax'
  omx-4: 'OMX_AUTO_UPDATE=0 CODEX_HOME=~/.codex-team/4 omx --direct --madmax'
  omx-5: 'OMX_AUTO_UPDATE=0 CODEX_HOME=~/.codex-team/5 omx --direct --madmax'

members:
  # Window 1: kru32-oracle (lead + assistant + compile)
  - role: lead
    name: kru32-oracle
    engine: claude
    worktree: false   # lead = session ปัจจุบัน ไม่ต้อง worktree (#258)

  - role: assistant
    name: assistant
    engine: omx-1
    worktree: false   # opt-out explicit (#258) = share cwd กับ lead (แก้ code ด้วยกัน)

  - role: compile
    name: compile
    engine: omx-3
    worktree: true
    branch: agents/kru32-compile

  # Window 2: codex-team (coder-1 + coder-2 + qa + designer)
  - role: coder-1
    name: coder-1
    engine: omx-1
    worktree: true
    branch: agents/kru32-coder-1

  - role: coder-2
    name: coder-2
    engine: omx-3
    worktree: true
    branch: agents/kru32-coder-2

  - role: qa
    name: qa
    engine: omx-4
    worktree: true
    branch: agents/kru32-qa

  - role: designer
    name: designer
    engine: omx-5
    worktree: true
    branch: agents/kru32-designer
